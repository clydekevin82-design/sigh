name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            runtime: win-x64
          - name: Linux x64
            os: ubuntu-latest
            runtime: linux-x64
          - name: macOS x64
            os: macos-latest
            runtime: osx-x64
          - name: macOS Apple Silicon
            os: macos-latest
            runtime: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MusicImporterApp/LtdMusicImporter.csproj -r ${{ matrix.runtime }}

      - name: Test build
        run: dotnet build MusicImporterApp/LtdMusicImporter.csproj -c Release -r ${{ matrix.runtime }} --no-restore

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "ci-$env:GITHUB_SHA".Substring(0, 10) }
          scripts/package-windows.ps1 -Configuration Release -Runtime ${{ matrix.runtime }} -ReleaseVersion $version

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_TYPE:-branch}"
          if [ "$version" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="ci-${GITHUB_SHA:0:7}"
          fi
          RELEASE_VERSION="$version" RUNTIME="${{ matrix.runtime }}" scripts/package-release.sh

      - name: Safety check
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/check-release-safety.sh artifacts/*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LtdMusicImporter-${{ matrix.runtime }}
          path: artifacts/*.zip

      - name: GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          body_path: gamebanana/RELEASE_NOTES.md
