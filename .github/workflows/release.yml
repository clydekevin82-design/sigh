name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MusicImporterApp/LtdMusicImporter.csproj -r win-x64

      - name: Test build
        run: dotnet build MusicImporterApp/LtdMusicImporter.csproj -c Release -r win-x64 --no-restore

      - name: Package
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "ci-$env:GITHUB_SHA".Substring(0, 10) }
          scripts/package-windows.ps1 -Configuration Release -Runtime win-x64 -ReleaseVersion $version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LtdMusicImporter-win-x64
          path: artifacts/*.zip

      - name: GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          body_path: gamebanana/RELEASE_NOTES.md
